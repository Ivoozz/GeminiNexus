<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Autonomous AI</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0d0d0d; color: #ececec; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #2f2f2f; border-radius: 10px; }
        .thought { color: #8e8ea0; font-style: italic; border-left: 2px solid #2f2f2f; padding-left: 1rem; margin: 0.75rem 0; font-size: 0.9rem; }
        .tool-call { color: #10a37f; font-family: 'Courier New', monospace; background: #1a1a1a; padding: 0.5rem; border-radius: 0.5rem; border: 1px solid #333; margin: 0.5rem 0; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [view, setView] = useState('loading');
            const [token, setToken] = useState(localStorage.getItem('nexus_token'));

            useEffect(() => {
                axios.get('/api/setup-status').then(res => {
                    if (!res.data.onboarded) setView('setup');
                    else if (!token) setView('login');
                    else setView('main');
                }).catch(() => setView('login'));
            }, []);

            if (view === 'loading') return <div className="h-screen flex items-center justify-center animate-pulse text-emerald-500 font-mono italic text-sm tracking-widest">BOOTING_NEXUS...</div>;
            if (view === 'setup') return <SetupWizard onComplete={() => setView('login')} />;
            if (view === 'login') return <LoginView onComplete={(t) => { setToken(t); localStorage.setItem('nexus_token', t); setView('main'); }} />;
            return <MainView token={token} onLogout={() => { setToken(null); localStorage.removeItem('nexus_token'); setView('login'); }} />;
        };

        const SetupWizard = ({ onComplete }) => {
            const [data, setData] = useState({ password: '', telegram_token: '', telegram_chat_id: '' });
            const submit = async () => {
                await axios.post('/api/onboard', data);
                onComplete();
            };
            return (
                <div className="h-screen flex items-center justify-center p-6 bg-[#0d0d0d]">
                    <div className="max-w-md w-full bg-[#171717] p-8 rounded-3xl border border-[#2f2f2f] shadow-2xl">
                        <h1 className="text-2xl font-bold mb-2">Initialize Nexus</h1>
                        <p className="text-sm text-gray-400 mb-8">Establish your secure autonomous gateway.</p>
                        <input type="password" placeholder="Gateway Password" className="w-full bg-black border border-[#2f2f2f] rounded-xl p-4 mb-4 outline-none focus:border-emerald-500" onChange={e => setData({...data, password: e.target.value})} />
                        <button onClick={submit} className="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-bold transition-all">START_ONBOARDING</button>
                    </div>
                </div>
            );
        };

        const LoginView = ({ onComplete }) => {
            const [pwd, setPwd] = useState('');
            const submit = (e) => {
                e.preventDefault();
                axios.post('/api/login', { password: pwd }).then(res => onComplete(res.data.access_token)).catch(() => alert('Access Denied'));
            };
            return (
                <div className="h-screen flex items-center justify-center bg-[#0d0d0d]">
                    <form onSubmit={submit} className="max-w-sm w-full text-center">
                        <div className="bg-emerald-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-lg shadow-emerald-500/20">
                            <i data-lucide="shield-check" className="text-white w-8 h-8"></i>
                        </div>
                        <input type="password" placeholder="Passkey" className="w-full bg-[#171717] border border-[#2f2f2f] rounded-2xl p-5 text-center mb-4 outline-none focus:border-emerald-500 transition-all" onChange={e => setPwd(e.target.value)} autoFocus />
                        <button className="w-full bg-[#2f2f2f] hover:bg-[#3f3f3f] py-4 rounded-2xl font-bold transition-all uppercase tracking-widest text-xs">Authorize</button>
                    </form>
                </div>
            );
        };

        const MainView = ({ token, onLogout }) => {
            const [activeTab, setActiveTab] = useState('chat');
            const [status, setStatus] = useState({});

            useEffect(() => {
                const f = () => axios.get('/api/status', { headers: { Authorization: `Bearer ${token}` } }).then(res => setStatus(res.data));
                f(); const i = setInterval(f, 15000); return () => clearInterval(i);
            }, []);

            useEffect(() => { lucide.createIcons(); }, [activeTab]);

            return (
                <div className="flex h-screen bg-[#0d0d0d]">
                    {/* Sidebar */}
                    <div className="w-64 bg-[#171717] border-r border-[#2f2f2f] flex flex-col hidden md:flex">
                        <div className="p-4 flex items-center justify-between">
                            <div className="flex items-center space-x-2 font-bold text-sm tracking-tight italic">
                                <div className="bg-emerald-600 p-1 rounded-md text-white"><i data-lucide="zap" className="w-3 h-3"></i></div>
                                <span>NEXUS_OS</span>
                            </div>
                            <button onClick={() => window.location.reload()} className="p-2 hover:bg-[#2f2f2f] rounded-lg transition-colors"><i data-lucide="refresh-cw" className="w-4 h-4"></i></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar">
                            <div className="px-3 py-2 text-[10px] font-bold text-gray-500 uppercase tracking-widest">Workspace</div>
                            {['chat', 'files', 'logs'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`w-full text-left px-3 py-2 rounded-lg text-sm transition-all flex items-center space-x-3 ${activeTab === tab ? 'bg-[#2f2f2f] text-white' : 'text-gray-400 hover:bg-[#2f2f2f] hover:text-gray-200'}`}>
                                    <i data-lucide={tab === 'chat' ? 'message-square' : tab === 'files' ? 'folder' : 'terminal'} className="w-4 h-4"></i>
                                    <span className="capitalize">{tab}</span>
                                </button>
                            ))}
                        </div>
                        <div className="p-4 border-t border-[#2f2f2f] space-y-2">
                            <div className="flex justify-between text-[10px] font-mono text-gray-500">
                                <span>DISK: {status.disk}</span>
                                <span>MEM: {status.mem}</span>
                            </div>
                            <button onClick={onLogout} className="w-full flex items-center space-x-3 text-gray-500 hover:text-white px-3 py-2 text-sm transition-all">
                                <i data-lucide="log-out" className="w-4 h-4"></i>
                                <span>Sign Out</span>
                            </button>
                        </div>
                    </div>

                    {/* Main Area with persistent tabs */}
                    <div className="flex-1 flex flex-col relative overflow-hidden">
                        <div className={`flex-1 ${activeTab === 'chat' ? 'block' : 'hidden'}`}>
                            <ChatComponent token={token} />
                        </div>
                        <div className={`flex-1 ${activeTab === 'files' ? 'block' : 'hidden'}`}>
                            <FilesComponent token={token} />
                        </div>
                        <div className={`flex-1 ${activeTab === 'logs' ? 'block' : 'hidden'}`}>
                            <LogsComponent token={token} />
                        </div>
                    </div>
                </div>
            );
        };

        const ChatComponent = ({ token }) => {
            const [msgs, setMsgs] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const endRef = useRef();

            useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs]);

            const send = async (e) => {
                e.preventDefault(); if (!input.trim() || loading) return;
                const userMsg = input; setInput(''); setLoading(true);
                const mid = Date.now();
                setMsgs(p => [...p, { id: mid, role: 'user', content: userMsg }, { id: mid+1, role: 'ai', content: '', isThinking: true }]);

                const streamUrl = `/api/chat/stream?message=${encodeURIComponent(userMsg)}&token=${token}`;
                const streamEs = new EventSource(streamUrl);

                streamEs.onmessage = (ev) => {
                    setMsgs(p => {
                        const next = [...p];
                        const ai = next.find(m => m.id === mid+1);
                        if (ai) { ai.content += ev.data; ai.isThinking = false; }
                        return next;
                    });
                };
                streamEs.onerror = () => { streamEs.close(); setLoading(false); };
            };

            const format = (text) => {
                return text.split('\n').map((line, i) => {
                    if (line.includes('I will') || line.includes('Thinking')) return <div key={i} className="thought">{line}</div>;
                    if (line.includes('Calling') || line.includes('Executed')) return <div key={i} className="tool-call">{line}</div>;
                    return <p key={i} className="mb-2">{line}</p>;
                });
            };

            return (
                <div className="h-full flex flex-col max-w-4xl mx-auto w-full p-4 md:p-10">
                    <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar space-y-8">
                        {msgs.length === 0 && (
                            <div className="h-full flex flex-col items-center justify-center text-center space-y-4 opacity-50">
                                <div className="bg-[#171717] p-4 rounded-3xl border border-[#2f2f2f]"><i data-lucide="bot" className="w-8 h-8 text-emerald-500"></i></div>
                                <h2 className="text-xl font-bold tracking-tight">System Ready</h2>
                                <p className="text-sm max-w-xs">Autonomous YOLO mode is active. All tool executions are authorized.</p>
                            </div>
                        )}
                        {msgs.map(m => (
                            <div key={m.id} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[90%] md:max-w-[80%] rounded-2xl text-sm md:text-base leading-relaxed ${m.role === 'user' ? 'bg-[#2f2f2f] px-5 py-3 text-white' : ''}`}>
                                    {m.role === 'ai' ? format(m.content) : m.content}
                                    {m.isThinking && <div className="animate-pulse text-emerald-500 text-[10px] font-bold mt-2 uppercase tracking-tighter">Nexus is calculating...</div>}
                                </div>
                            </div>
                        ))}
                        <div ref={endRef} />
                    </div>
                    <form onSubmit={send} className="mt-8 relative group">
                        <div className="absolute inset-0 bg-emerald-500/5 blur-xl group-focus-within:bg-emerald-500/10 transition-all rounded-full"></div>
                        <input value={input} onChange={e => setInput(e.target.value)} disabled={loading}
                            className="relative w-full bg-[#171717] border border-[#2f2f2f] rounded-2xl p-5 pr-16 outline-none focus:border-[#4f4f4f] shadow-2xl transition-all placeholder-gray-600" 
                            placeholder="Message Gemini (Autonomous Mode Active)..." />
                        <button className="absolute right-4 top-4 bg-white text-black p-2 rounded-xl hover:scale-105 transition-all disabled:opacity-50">
                            <i data-lucide="arrow-up" className="w-5 h-5"></i>
                        </button>
                    </form>
                    <div className="text-[10px] text-center mt-4 text-gray-600 uppercase tracking-widest font-bold">Nexus OS // YOLO_ENFORCED</div>
                </div>
            );
        };

        const FilesComponent = ({ token }) => {
            const [files, setFiles] = useState([]);
            useEffect(() => { axios.get('/api/files', { headers: { Authorization: `Bearer ${token}` } }).then(res => setFiles(res.data)); }, []);
            return (
                <div className="p-10 grid grid-cols-1 md:grid-cols-3 gap-6 overflow-y-auto h-full custom-scrollbar">
                    {files.length === 0 && <div className="col-span-3 text-center text-gray-500 py-20 italic">No files in sandbox.</div>}
                    {files.map(f => (
                        <div key={f.name} className="bg-[#171717] border border-[#2f2f2f] p-6 rounded-3xl hover:border-emerald-500/50 transition-all group">
                            <i data-lucide="file-text" className="w-10 h-10 text-gray-600 mb-4 group-hover:text-emerald-500 transition-colors"></i>
                            <div className="font-bold text-sm truncate">{f.name}</div>
                            <div className="text-[10px] text-gray-500 font-mono">{(f.size/1024).toFixed(1)} KB</div>
                        </div>
                    ))}
                </div>
            );
        };

        const LogsComponent = ({ token }) => {
            const [logs, setLogs] = useState('');
            useEffect(() => { 
                const f = () => axios.get('/api/logs', { headers: { Authorization: `Bearer ${token}` } }).then(res => setLogs(res.data.logs));
                f(); const i = setInterval(f, 5000); return () => clearInterval(i);
            }, []);
            return <div className="p-10 h-full"><pre className="bg-black border border-[#2f2f2f] p-8 rounded-3xl h-full overflow-y-auto text-[11px] font-mono text-emerald-500/80 custom-scrollbar shadow-inner leading-relaxed">{logs}</pre></div>;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
