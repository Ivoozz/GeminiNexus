<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeminiNexus | Autonomous AI</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
        .thought { color: #94a3b8; font-style: italic; border-left: 2px solid #334155; padding-left: 0.75rem; margin: 0.5rem 0; font-size: 0.85rem; }
        .tool-call { color: #38bdf8; font-family: monospace; font-size: 0.75rem; background: #0f172a; padding: 0.2rem 0.4rem; border-radius: 0.25rem; margin: 0.2rem 0; display: block; }
    </style>
</head>
<body class="overflow-hidden text-slate-200">
    <div id="root"></div>

    <script type="text/javascript">
        const { useState, useEffect, useRef } = React;
        const e = React.createElement;

        const FormInput = ({ label, value, onChange, type="text", placeholder="" }) => 
            e('div', { className: 'space-y-1' },
                e('label', { className: 'text-[10px] font-bold text-slate-500 uppercase tracking-wider' }, label),
                e('input', { 
                    type, placeholder, value,
                    className: 'w-full bg-slate-900 border border-slate-800 rounded-xl p-3 outline-none focus:ring-1 focus:ring-blue-500 text-sm',
                    onChange: ev => onChange(e.target ? ev.target.value : ev) 
                })
            );

        const App = () => {
            const [view, setView] = useState('loading');
            const [token, setToken] = useState(localStorage.getItem('nexus_token'));

            useEffect(() => {
                axios.get('/api/setup-status').then(res => {
                    if (!res.data.onboarded) setView('setup');
                    else if (!token) setView('login');
                    else setView('dashboard');
                }).catch(() => setView('login'));
            }, []);

            if (view === 'loading') return e('div', { className: 'h-screen flex items-center justify-center font-mono text-blue-500' }, 'INITIALIZING_NEXUS...');
            if (view === 'setup') return e(SetupWizard, { onComplete: () => setView('login') });
            if (view === 'login') return e(LoginView, { onComplete: (t) => { setToken(t); localStorage.setItem('nexus_token', t); setView('dashboard'); } });
            return e(Dashboard, { token, onLogout: () => { setToken(null); localStorage.removeItem('nexus_token'); setView('login'); } });
        };

        const SetupWizard = ({ onComplete }) => {
            const [step, setStep] = useState(1);
            const [formData, setFormData] = useState({ password: '', telegram_token: '', telegram_chat_id: '', smtp_host: '', smtp_port: '587', smtp_user: '', smtp_pass: '', imap_host: '', imap_port: '993' });
            const update = (f, v) => setFormData(p => ({ ...p, [f]: v }));
            
            return e('div', { className: 'h-screen flex items-center justify-center p-4' },
                e('div', { className: 'bg-slate-900 p-8 rounded-3xl border border-slate-800 w-full max-w-md shadow-2xl' },
                    e('h1', { className: 'text-xl font-bold mb-6' }, 'GeminiNexus Setup'),
                    step === 1 && e('div', { className: 'space-y-4' },
                        e(FormInput, { label: 'Password', value: formData.password, onChange: v => update('password', v), type: 'password' }),
                        e('button', { onClick: () => setStep(2), className: 'w-full bg-blue-600 p-3 rounded-xl font-bold' }, 'Volgende')
                    ),
                    step === 2 && e('div', { className: 'space-y-4' },
                        e(FormInput, { label: 'Telegram Token', value: formData.telegram_token, onChange: v => update('telegram_token', v) }),
                        e('div', { className: 'flex space-x-2' },
                            e('button', { onClick: () => setStep(1), className: 'flex-1 bg-slate-800 p-3 rounded-xl' }, 'Terug'),
                            e('button', { onClick: async () => { await axios.post('/api/onboard', formData); onComplete(); }, className: 'flex-1 bg-blue-600 p-3 rounded-xl font-bold' }, 'Voltooien')
                        )
                    )
                )
            );
        };

        const LoginView = ({ onComplete }) => {
            const [pwd, setPwd] = useState('');
            const submit = (ev) => {
                ev.preventDefault();
                axios.post('/api/login', { password: pwd }).then(res => onComplete(res.data.access_token)).catch(() => alert('Fout'));
            };
            return e('div', { className: 'h-screen flex items-center justify-center' },
                e('form', { onSubmit: submit, className: 'bg-slate-900 p-10 rounded-3xl border border-slate-800 w-full max-w-sm text-center shadow-2xl' },
                    e('div', { className: 'bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center mx-auto mb-6' }, e('i', { 'data-lucide': 'zap', className: 'w-6 h-6' })),
                    e('input', { type: 'password', className: 'w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 text-center mb-4', placeholder: 'PASSWORD', onChange: ev => setPwd(ev.target.value) }),
                    e('button', { className: 'w-full bg-blue-600 py-4 rounded-2xl font-bold' }, 'ENTER')
                )
            );
        };

        const Dashboard = ({ token, onLogout }) => {
            const [activeTab, setActiveTab] = useState('chat');
            const [status, setStatus] = useState({});
            
            useEffect(() => {
                const fetch = () => axios.get('/api/status', { headers: { Authorization: `Bearer ${token}` } }).then(res => setStatus(res.data));
                fetch(); const i = setInterval(fetch, 10000); return () => clearInterval(i);
            }, []);

            useEffect(() => { lucide.createIcons(); }, [activeTab]);

            return e('div', { className: 'flex flex-col h-screen' },
                e('header', { className: 'bg-slate-900/50 border-b border-slate-800 p-4 flex justify-between items-center backdrop-blur-md' },
                    e('div', { className: 'flex items-center space-x-3' },
                        e('div', { className: 'bg-blue-600 p-1 rounded-lg' }, e('i', { 'data-lucide': 'cpu', className: 'w-4 h-4' })),
                        e('span', { className: 'font-bold tracking-tighter' }, 'NEXUS')
                    ),
                    e('nav', { className: 'flex space-x-6' },
                        ['chat', 'files', 'logs'].map(tab => e('button', { 
                            key: tab, 
                            onClick: () => setActiveTab(tab),
                            className: `text-[10px] uppercase font-bold tracking-widest transition-all ${activeTab === tab ? 'text-blue-500' : 'text-slate-500 hover:text-slate-300'}`
                        }, tab))
                    ),
                    e('div', { className: 'flex items-center space-x-4' },
                        e('div', { className: 'text-[9px] font-mono text-slate-500 hidden md:block' }, `UPTIME: ${status.uptime || '...'}`),
                        e('button', { onClick: onLogout, className: 'text-slate-500' }, e('i', { 'data-lucide': 'log-out', className: 'w-4 h-4' }))
                    )
                ),
                e('main', { className: 'flex-1 overflow-hidden relative' },
                    activeTab === 'chat' && e(ChatView, { token }),
                    activeTab === 'files' && e(FilesView, { token }),
                    activeTab === 'logs' && e(LogsView, { token })
                )
            );
        };

        const ChatView = ({ token }) => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isStreaming, setIsStreaming] = useState(false);
            const scrollRef = useRef();

            useEffect(() => { scrollRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            const send = (ev) => {
                ev.preventDefault(); if (!input.trim() || isStreaming) return;
                const id = Date.now();
                setMessages(p => [...p, { id, role: 'user', text: input }, { id: id+1, role: 'ai', text: '', isThinking: true }]);
                const curInput = input; setInput(''); setIsStreaming(true);
                
                const es = new EventSource(`/api/chat/stream?message=${encodeURIComponent(curInput)}&token=${token}`);
                es.onmessage = (e) => {
                    setMessages(p => {
                        const next = [...p]; const ai = next.find(m => m.id === id+1);
                        if (ai) { ai.text += e.data; ai.isThinking = false; }
                        return next;
                    });
                };
                es.onerror = () => { es.close(); setIsStreaming(false); };
            };

            const format = (txt) => txt.split('\n').map((l, i) => {
                if (l.includes('I will') || l.includes('Thinking')) return e('div', { key: i, className: 'thought' }, l);
                if (l.includes('Calling') || l.includes('Executed')) return e('div', { key: i, className: 'tool-call' }, l);
                return e('div', { key: i }, l);
            });

            return e('div', { className: 'h-full flex flex-col p-6' },
                e('div', { className: 'flex-1 overflow-y-auto space-y-6 custom-scrollbar pr-4' },
                    messages.map(m => e('div', { key: m.id, className: `flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}` },
                        e('div', { className: `max-w-[85%] p-4 rounded-2xl text-sm leading-relaxed ${m.role === 'user' ? 'bg-blue-700' : 'bg-slate-900 border border-slate-800'}` },
                            m.role === 'ai' ? format(m.text) : m.text,
                            m.isThinking && e('div', { className: 'animate-pulse text-[10px] mt-2' }, 'CONSULTING_GEMINI...')
                        )
                    )),
                    e('div', { ref: scrollRef })
                ),
                e('form', { onSubmit: send, className: 'mt-4 relative' },
                    e('input', { 
                        className: 'w-full bg-slate-900 border border-slate-800 rounded-2xl p-5 pr-14 outline-none focus:ring-1 focus:ring-blue-600 shadow-2xl',
                        placeholder: 'COMMAND_YOLO >_', value: input, onChange: ev => setInput(ev.target.value), disabled: isStreaming
                    }),
                    e('button', { className: 'absolute right-4 top-4 bg-blue-600 p-2 rounded-xl' }, e('i', { 'data-lucide': 'send', className: 'w-5 h-5' }))
                )
            );
        };

        const FilesView = ({ token }) => {
            const [files, setFiles] = useState([]);
            useEffect(() => { axios.get('/api/files', { headers: { Authorization: `Bearer ${token}` } }).then(res => setFiles(res.data)); }, []);
            return e('div', { className: 'p-8 grid grid-cols-1 md:grid-cols-3 gap-4' },
                files.map(f => e('div', { key: f.name, className: 'bg-slate-900 p-4 rounded-2xl border border-slate-800' },
                    e('div', { className: 'flex items-center space-x-3' },
                        e('i', { 'data-lucide': 'file', className: 'w-4 h-4 text-blue-500' }),
                        e('div', null, e('div', { className: 'font-bold text-sm' }, f.name), e('div', { className: 'text-[10px] text-slate-500' }, `${(f.size/1024).toFixed(1)} KB`))
                    )
                ))
            );
        };

        const LogsView = ({ token }) => {
            const [logs, setLogs] = useState('');
            useEffect(() => { 
                const f = () => axios.get('/api/logs', { headers: { Authorization: `Bearer ${token}` } }).then(res => setLogs(res.data.logs));
                f(); const i = setInterval(f, 5000); return () => clearInterval(i);
            }, []);
            return e('div', { className: 'p-6 h-full' }, e('pre', { className: 'bg-black/50 p-6 rounded-2xl border border-slate-800 h-full overflow-y-auto text-[10px] font-mono text-slate-400 custom-scrollbar' }, logs));
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
