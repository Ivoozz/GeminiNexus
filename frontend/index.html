<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeminiNexus | Autonomous AI</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
        .thought { color: #94a3b8; font-style: italic; border-left: 2px solid #334155; padding-left: 0.75rem; margin-top: 0.5rem; margin-bottom: 0.5rem; }
        .tool-call { color: #38bdf8; font-family: monospace; font-size: 0.85rem; background: #0f172a; padding: 0.25rem 0.5rem; border-radius: 0.25rem; }
    </style>
</head>
<body class="overflow-hidden">
    <div id="root"></div>

    <script type="text/javascript">
        const { useState, useEffect, useRef } = React;

        const FormInput = ({ label, value, onChange, type="text", placeholder="" }) => (
            <div className="space-y-1">
                <label className="text-xs font-semibold text-slate-500 uppercase">{label}</label>
                <input type={type} placeholder={placeholder} value={value}
                    className="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 outline-none focus:ring-1 focus:ring-blue-500"
                    onChange={e => onChange(e.target.value)} />
            </div>
        );

        const App = () => {
            const [view, setView] = useState('loading');
            const [token, setToken] = useState(localStorage.getItem('nexus_token'));

            useEffect(() => {
                axios.get('/api/setup-status').then(res => {
                    if (!res.data.onboarded) setView('setup');
                    else if (!token) setView('login');
                    else setView('chat');
                }).catch(() => setView('login'));
            }, []);

            if (view === 'loading') return <div className="h-screen flex items-center justify-center font-mono">INITIALIZING...</div>;
            if (view === 'setup') return <SetupWizard onComplete={() => setView('login')} />;
            if (view === 'login') return <LoginView onComplete={(t) => { setToken(t); localStorage.setItem('nexus_token', t); setView('chat'); }} />;
            return <ChatView token={token} onLogout={() => { setToken(null); localStorage.removeItem('nexus_token'); setView('login'); }} />;
        };

        const SetupWizard = ({ onComplete }) => {
            const [step, setStep] = useState(1);
            const [formData, setFormData] = useState({ password: '', telegram_token: '', telegram_chat_id: '', smtp_host: '', smtp_port: '587', smtp_user: '', smtp_pass: '', imap_host: '', imap_port: '993', imap_user: '', imap_pass: '' });
            const update = (f, v) => setFormData(p => ({ ...p, [f]: v }));
            const submit = async () => {
                try { await axios.post('/api/onboard', formData); onComplete(); }
                catch (e) { alert('Fout: ' + e.response?.data?.detail); }
            };

            return (
                <div className="h-screen flex items-center justify-center p-4">
                    <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800 w-full max-w-lg shadow-2xl">
                        <div className="mb-8">
                            <h1 className="text-2xl font-bold">GeminiNexus Setup</h1>
                            <p className="text-sm text-slate-500">Stap {step} van 3</p>
                        </div>
                        {step === 1 && <div className="space-y-4">
                            <FormInput label="Admin Wachtwoord" value={formData.password} onChange={v => update('password', v)} type="password" />
                            <button onClick={() => setStep(2)} className="w-full bg-blue-600 p-4 rounded-xl font-bold">Volgende</button>
                        </div>}
                        {step === 2 && <div className="space-y-4">
                            <FormInput label="Telegram Token" value={formData.telegram_token} onChange={v => update('telegram_token', v)} />
                            <FormInput label="Chat ID" value={formData.telegram_chat_id} onChange={v => update('telegram_chat_id', v)} />
                            <div className="flex space-x-2"><button onClick={() => setStep(1)} className="flex-1 bg-slate-800 p-4 rounded-xl">Terug</button>
                            <button onClick={() => setStep(3)} className="flex-1 bg-blue-600 p-4 rounded-xl font-bold">Volgende</button></div>
                        </div>}
                        {step === 3 && <div className="space-y-4">
                            <div className="grid grid-cols-2 gap-2"><FormInput label="SMTP" value={formData.smtp_host} onChange={v => update('smtp_host', v)} /><FormInput label="IMAP" value={formData.imap_host} onChange={v => update('imap_host', v)} /></div>
                            <FormInput label="Email Gebruiker" value={formData.smtp_user} onChange={v => update('smtp_user', v)} />
                            <FormInput label="Email Wachtwoord" value={formData.smtp_pass} onChange={v => update('smtp_pass', v)} type="password" />
                            <div className="flex space-x-2"><button onClick={() => setStep(2)} className="flex-1 bg-slate-800 p-4 rounded-xl">Terug</button>
                            <button onClick={submit} className="flex-1 bg-green-600 p-4 rounded-xl font-bold text-white">Afronden</button></div>
                        </div>}
                    </div>
                </div>
            );
        };

        const LoginView = ({ onComplete }) => {
            const [password, setPassword] = useState('');
            const submit = async (e) => {
                e.preventDefault();
                try { const res = await axios.post('/api/login', { password }); onComplete(res.data.access_token); }
                catch (e) { alert('Onjuist'); }
            };
            return (
                <div className="h-screen flex items-center justify-center">
                    <div className="bg-slate-900 p-10 rounded-3xl border border-slate-800 w-full max-w-md text-center">
                        <h1 className="text-3xl font-bold mb-8">GeminiNexus</h1>
                        <form onSubmit={submit} className="space-y-4">
                            <input type="password" placeholder="Wachtwoord" className="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 text-center outline-none focus:ring-1 focus:ring-blue-500" onChange={e => setPassword(e.target.value)} />
                            <button className="w-full bg-blue-600 py-4 rounded-2xl font-bold">Enter</button>
                        </form>
                    </div>
                </div>
            );
        };

        const ChatView = ({ token, onLogout }) => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isStreaming, setIsStreaming] = useState(false);
            const [status, setStatus] = useState({ disk_usage: '...', memory_usage: '...' });
            const chatEndRef = useRef(null);

            useEffect(() => {
                fetchStatus();
                const i = setInterval(fetchStatus, 30000);
                return () => clearInterval(i);
            }, []);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
                lucide.createIcons();
            }, [messages]);

            const fetchStatus = () => axios.get('/api/status', { headers: { Authorization: `Bearer ${token}` } }).then(res => setStatus(res.data)).catch(onLogout);

            const send = (e) => {
                e.preventDefault();
                if (!input.trim() || isStreaming) return;

                const userMsg = { id: Date.now(), role: 'user', text: input };
                setMessages(prev => [...prev, userMsg]);
                
                const aiMsgId = Date.now() + 1;
                setMessages(prev => [...prev, { id: aiMsgId, role: 'ai', text: '', isThinking: true }]);
                
                setIsStreaming(true);
                const currentInput = input;
                setInput('');

                // Start SSE Stream
                const eventSource = new EventSource(`/api/chat/stream?message=${encodeURIComponent(currentInput)}&token=${token}`);
                
                eventSource.onmessage = (event) => {
                    const data = event.data;
                    setMessages(prev => {
                        const newMsgs = [...prev];
                        const aiMsg = newMsgs.find(m => m.id === aiMsgId);
                        if (aiMsg) {
                            aiMsg.text += data;
                            aiMsg.isThinking = false;
                        }
                        return newMsgs;
                    });
                };

                eventSource.onerror = (err) => {
                    eventSource.close();
                    setIsStreaming(false);
                };

                // In some cases, we need a way to detect the end of stream
                // The CLI doesn't always send an "end" signal, so we rely on the connection closing
            };

            const formatMessage = (text) => {
                // Heuristics for thoughts and tool calls
                return text.split('\n').map((line, i) => {
                    if (line.includes('I will') || line.includes('Thinking')) return <div key={i} className="thought">{line}</div>;
                    if (line.includes('Calling tool') || line.includes('Executed')) return <div key={i} className="tool-call">{line}</div>;
                    return <div key={i}>{line}</div>;
                });
            };

            return (
                <div className="flex flex-col h-screen">
                    <header className="bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center">
                        <div className="flex items-center space-x-2">
                            <div className="bg-blue-600 p-1 rounded-lg"><i data-lucide="zap" className="w-4 h-4 text-white"></i></div>
                            <span className="font-bold tracking-tighter text-lg italic">GEMINI NEXUS <span className="text-[10px] text-red-500 bg-red-500/10 px-1 rounded not-italic font-bold">YOLO</span></span>
                        </div>
                        <div className="flex items-center space-x-4">
                            <div className="hidden sm:block text-[10px] text-slate-500 font-mono">D:{status.disk_usage} R:{status.memory_usage}</div>
                            <button onClick={onLogout} className="text-slate-500 hover:text-white"><i data-lucide="log-out" className="w-4 h-4"></i></button>
                        </div>
                    </header>
                    <main className="flex-1 container mx-auto max-w-5xl p-6 flex flex-col overflow-hidden">
                        <div className="flex-1 overflow-y-auto mb-6 pr-4 space-y-6 custom-scrollbar">
                            {messages.map(msg => (
                                <div key={msg.id} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[90%] p-4 rounded-2xl text-sm leading-relaxed ${msg.role === 'user' ? 'bg-blue-700 text-white shadow-lg' : 'bg-slate-900 border border-slate-800'}`}>
                                        {msg.role === 'ai' ? formatMessage(msg.text) : msg.text}
                                        {msg.isThinking && <div className="animate-pulse flex space-x-2 mt-2"><div className="w-1 h-1 bg-slate-500 rounded-full"></div><div className="w-1 h-1 bg-slate-500 rounded-full"></div></div>}
                                    </div>
                                </div>
                            ))}
                            <div ref={chatEndRef}></div>
                        </div>
                        <form onSubmit={send} className="relative mb-2">
                            <input type="text" value={input} onChange={e => setInput(e.target.value)} disabled={isStreaming}
                                placeholder={isStreaming ? "AI is bezig met autonome taken..." : "Geef een commando (YOLO mode actief)..."} 
                                className="w-full bg-slate-900 border border-slate-800 rounded-2xl p-5 pr-14 outline-none focus:ring-1 focus:ring-blue-600 shadow-2xl disabled:opacity-50" />
                            <button className="absolute right-4 top-4 bg-blue-600 p-2 rounded-xl hover:bg-blue-500 shadow-lg"><i data-lucide="send" className="w-5 h-5"></i></button>
                        </form>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
